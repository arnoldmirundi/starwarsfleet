<div class="h-screen flex flex-col" style="font-family: 'Inter', system-ui, sans-serif;">

  @if(ships.loading() && !ships.starships().length) {
    <div class="flex-1 flex items-center justify-center">
      <span style="font-size:14px; color: rgba(96,100,108,1);">Loading starships...</span>
    </div>
  } @else {

    @if(ships.error()) {
      <div style="padding: 8px 16px; border-bottom: 1px solid rgba(224,225,230,1);">
        <div style="background:#fef2f2; border:1px solid #fecaca; color:#dc2626; border-radius:6px; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:14px;">
          <span>{{ ships.error() }}</span>
          <button style="background:#dc2626; color:#fff; border:none; border-radius:6px; padding:4px 12px; font-size:13px; cursor:pointer;" (click)="ships.retryLoad()">Retry</button>
        </div>
      </div>
    }

    <!---- Page header -->
    <div style="height:44px; display:flex; align-items:center; padding:8px 16px; border-bottom:0.5px solid rgba(224,225,230,1);">
      <div style="display:flex; align-items:center;">

        <!-- Search field: 280×28, blue border, 6px radius -->
        <div style="display:flex; align-items:center; gap:8px; width:280px; height:28px; padding:4px 2px 4px 8px; background:#fff; border:1px solid rgba(64,93,255,1); border-radius:6px; box-shadow:0px 1px 2px 0px rgba(0,0,0,0.05); margin-left:-2px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;" aria-hidden="true">
            <circle cx="11" cy="11" r="8" stroke="rgba(96,100,108,1)" stroke-width="1.33"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="rgba(96,100,108,1)" stroke-width="1.33" stroke-linecap="round"/>
          </svg>
          <input
            type="text"
            placeholder="Search elements..."
            style="flex:1; border:none; outline:none; font-family:'Inter',sans-serif; font-size:14px; font-weight:400; line-height:20px; color:rgba(28,32,36,1); background:transparent; width:0;"
            (input)="updateSearchTerm($event)"
          />
        </div>

        
        <div style="width:17px; height:28px; display:flex; align-items:center; justify-content:center; padding:4px 8px; flex-shrink:0;">
          <div style="width:1px; height:20px; background:rgba(224,225,230,1);"></div>
        </div>

      
        <span style="font-family:'Inter',sans-serif; font-size:12px; font-weight:500; line-height:18px; color:rgba(96,100,108,1); white-space:nowrap;">
          {{ rowData().length }} elements
        </span>
      </div>
    </div>

    <!-- Grid area -->
    <main style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      @if(!rowData().length && !ships.loading()) {
        <div style="flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; color:rgba(96,100,108,1);">
          No matching starships found.
        </div>
      } @else {
        <div style="flex:1; min-height:0; overflow:hidden;">
          <ag-grid-angular
            class="ag-theme-quartz w-full h-full"
            [rowData]="rowData()"
            [columnDefs]="columnDefaults"
            [defaultColDef]="defaultColumnAttributes"
            [animateRows]="true"
            [pagination]="false"
            [domLayout]="'normal'"
            [suppressHorizontalScroll]="false"
            [stopEditingWhenCellsLoseFocus]="true"
            (gridReady)="onGridReady($event)"
            (bodyScrollEnd)="onBodyScrollEnd()"
            (cellValueChanged)="onCellValueChanged($event)"
          />
        </div>

        @if(endMessage()) {
          <div style="height:32px; display:flex; align-items:center; justify-content:center; border-top:1px solid rgba(224,225,230,1); font-family:'Inter',sans-serif; font-size:12px; font-weight:400; color:rgba(96,100,108,1);">
            End of results
          </div>
        }
      }
    </main>
  }
</div>
